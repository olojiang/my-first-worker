<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#feca57"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="100" height="100" rx="20" fill="url(#bgGradient)"/>
  
  <!-- 勾选框 -->
  <rect x="20" y="22" width="20" height="20" rx="5" fill="white" opacity="0.9"/>
  <path d="M24 32 L29 37 L36 27" stroke="#ff6b6b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 横线 1 -->
  <rect x="48" y="26" width="32" height="6" rx="3" fill="white" opacity="0.9"/>
  
  <!-- 勾选框 2 -->
  <rect x="20" y="52" width="20" height="20" rx="5" fill="white" opacity="0.6"/>
  
  <!-- 横线 2 -->
  <rect x="48" y="56" width="24" height="6" rx="3" fill="white" opacity="0.6"/>
  
  <!-- 底部装饰线 -->
  <rect x="20" y="82" width="60" height="4" rx="2" fill="white" opacity="0.3"/>
</svg>
